<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento Desk | News & Utility</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --accent: #3b82f6;
            --text: #e5e7eb;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(180px, auto);
            gap: 1.2rem;
            max-width: 1100px;
            width: 100%;
        }
        .bento-box {
            background: var(--card);
            border: 1px solid #2a2a2a;
            border-radius: 24px;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .bento-box:hover {
            transform: scale(1.03);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        /* Layout logic */
        .hero { grid-column: span 3; grid-row: span 2; }
        .side { grid-column: span 1; }
        .wide { grid-column: span 2; }
        
        h2 { margin-top: 0; font-size: 1.2rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        a { color: #fff; text-decoration: none; display: block; margin-bottom: 8px; font-size: 0.95rem; }
        a:hover { text-decoration: underline; }
        .temp { font-size: 2.5rem; font-weight: bold; margin: 0; }
        .city { color: #888; margin-bottom: 1rem; }
        .bio-img { width: 50px; height: 50px; border-radius: 50%; background: #333; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="bento-grid">
        <div class="bento-box hero" id="latest-news">
            <h2>The Wire</h2>
            <div id="wire-content">Loading headlines...</div>
        </div>

        <div class="bento-box side">
            <h2>Local</h2>
            <div id="weather-display">
                <p class="temp">--°</p>
                <p class="city">Detecting...</p>
            </div>
        </div>

        <div class="bento-box side">
            <div class="bio-img"></div>
            <h2>Author</h2>
            <p style="font-size: 0.85rem; line-height: 1.4;">IT Specialist & Network Tech. Building tools for a faster web.</p>
        </div>

        <div class="bento-box wide" id="tech-news">
            <h2>The Stack</h2>
            <div id="stack-content">Loading tech updates...</div>
        </div>

        <div class="bento-box wide">
            <h2>Refdesk Utility</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <a href="https://www.merriam-webster.com/" target="_blank">📖 Dictionary</a>
                <a href="https://www.wikipedia.org/" target="_blank">🌐 Wikipedia</a>
                <a href="https://news.google.com/" target="_blank">📰 News Archive</a>
                <a href="https://github.com/trending" target="_blank">💻 Trending</a>
            </div>
        </div>
    </div>

    <script>
        // Fetch News from your data.json
        async function loadNews() {
            try {
                const res = await fetch('data.json');
                const data = await res.json();
                
                document.getElementById('wire-content').innerHTML = data.wire.map(item => 
                    `<a href="${item.link}" target="_blank">▶ ${item.title}</a>`).join('');
                
                document.getElementById('stack-content').innerHTML = data.stack.map(item => 
                    `<a href="${item.link}" target="_blank">▶ ${item.title}</a>`).join('');
            } catch (e) { console.log("Waiting for data.json..."); }
        }

        // Get Weather based on IP
        async function getWeather() {
            try {
                const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
                const weather = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geo.latitude}&longitude=${geo.longitude}&current_weather=true&temperature_unit=fahrenheit`).then(r => r.json());
                
                document.getElementById('weather-display').innerHTML = `
                    <p class="temp">${Math.round(weather.current_weather.temperature)}°F</p>
                    <p class="city">${geo.city}, ${geo.region_code}</p>
                `;
            } catch (e) { document.getElementById('weather-display').innerText = "Weather offline"; }
        }

        loadNews();
        getWeather();
    </script>
</body>
</html>
