    @keyframes tick-h { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    @keyframes tick-v { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
    .ticker:hover .ticker__track,
    .ticker:focus-within .ticker__track { animation-play-state: paused; }
 
    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: 200px 200px 1fr;
      grid-template-rows: auto 1fr;
      gap: 10px;
      max-width: 1600px;
      min-height: calc(100vh - var(--tick-h) * 2 - 24px);
    }
 
    /* Cards */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; overflow: hidden;
    }
    .card--weather { border-color: var(--blue); text-align: center; }
    .card--search  { border-color: var(--orange); }
    .card--wire    { grid-column: 3; grid-row: 1 / 3; overflow-y: auto; max-height: calc(100vh - var(--tick-h)*2 - 28px); }
    .card--mlb     { grid-column: 1; grid-row: 2; overflow-y: auto; border-color: var(--mlb); }
    .card--info    { grid-column: 2; grid-row: 2; overflow-y: auto; }
    .card__heading {
      font-size: 9px; font-weight: 700; color: var(--blue);
      text-transform: uppercase; letter-spacing: 0.25em;
      margin-bottom: 12px; font-family: var(--font);
    }
    .card--search .card__heading { color: var(--orange); }
    .card--mlb    .card__heading { color: #4a7ab5; }
 
    /* Weather */
    .weather__temp {
      font-size: 48px; font-weight: 300; color: var(--blue);
      line-height: 1; font-family: var(--font); letter-spacing: -0.02em;
    }
    .weather__city { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .weather__isp  { font-size: 10px; color: var(--dim);   margin-top: 3px; }
 
    /* Search */
    .search-form { display: flex; gap: 8px; margin-top: 4px; }
    .search-form input {
      flex: 1; min-width: 0; background: #1a1b1e;
      border: 1px solid var(--border-hi); color: var(--text);
      padding: 9px 12px; border-radius: var(--radius);
      font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    .search-form input:focus { border-color: var(--orange); box-shadow: 0 0 0 2px rgba(222,88,51,0.2); }
    .search-form button {
      background: var(--orange); border: none; color: #fff;
      padding: 9px 14px; border-radius: var(--radius);
      cursor: pointer; font-size: 13px; font-weight: 600;
      transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
    }
    .search-form button:hover  { opacity: 0.9; }
    .search-form button:active { transform: scale(0.97); }
    .search-form button:focus  { outline: 2px solid var(--orange); outline-offset: 2px; }
 
    /* News items */
    .news-item {
      display: block; color: #b0b4bb; font-size: 12px; line-height: 1.45;
      text-decoration: none; padding: 8px 0; border-bottom: 1px solid var(--border);
      transition: color 0.15s;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item:hover, .news-item:focus { color: var(--blue); outline: none; }
    .news-item:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; border-radius: 2px; }
    .news-item::before { content: "▸"; color: var(--dim); margin-right: 6px; font-size: 10px; }
    .source-tag {
      display: inline-block; font-size: 9px; font-weight: 700;
      color: var(--dim); letter-spacing: 0.1em; margin-right: 4px;
      text-transform: uppercase;
    }
 
    /* Status */
    .status { color: var(--dim); font-size: 11px; font-family: var(--font); text-align: center; padding: 24px 0; }
    .status::before { content: "◌ "; }
 
    /* Responsive — tablet */
    @media (max-width: 900px) {
      body { padding-left: 8px; }
      .ticker--left { display: none; }
      .grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto auto auto auto; }
      .card--wire { grid-column: 1 / 3; grid-row: 3; max-height: 400px; }
      .card--mlb  { grid-column: 1; grid-row: 4; }
      .card--info { grid-column: 2; grid-row: 4; }
    }
 
    /* Responsive — mobile */
    @media (max-width: 560px) {
      body { padding: calc(var(--tick-h) + 4px) 6px; }
      .grid { grid-template-columns: 1fr; gap: 8px; }
      .card--weather, .card--search, .card--wire,
      .card--mlb, .card--info { grid-column: 1; grid-row: auto; max-height: none; }
      .card--wire { max-height: 320px; overflow-y: auto; }
      .ticker__track a { font-size: 10px; padding: 0 16px; }
    }
 
    @media (prefers-reduced-motion: reduce) { .ticker__track { animation: none; } }
    @media (forced-colors: active) {
      .ticker { border-color: ButtonText; }
      .news-item { color: LinkText; }
      .card { border-color: ButtonText; }
    }
  </style>
</head>
<body>
 
  <a class="skip-link" href="#main-content">Skip to main content</a>
 
  <!-- NFL ticker (top) -->
  <nav class="ticker ticker--top" aria-label="NFL news ticker" aria-live="off">
    <span class="ticker__label" aria-hidden="true">NFL</span>
    <div class="ticker__track" id="nfl-track" aria-hidden="true"></div>
  </nav>
 
  <!-- MLB ticker (left) -->
  <nav class="ticker ticker--left" aria-label="MLB news ticker" aria-hidden="true">
    <div class="ticker__track" id="mlb-side-track"></div>
  </nav>
 
  <main id="main-content">
    <div class="grid">
 
      <!-- Weather -->
      <section class="card card--weather" aria-labelledby="weather-heading">
        <h2 class="card__heading" id="weather-heading">Weather</h2>
        <div id="weather-out" aria-live="polite" aria-atomic="true">
          <div class="weather__temp">--°</div>
          <p class="weather__city">Detecting…</p>
        </div>
      </section>
 
      <!-- Search -->
      <section class="card card--search" aria-labelledby="search-heading">
        <h2 class="card__heading" id="search-heading">Secure Search</h2>
        <form class="search-form" action="https://duckduckgo.com/" method="GET"
              target="_blank" rel="noopener noreferrer"
              role="search" aria-label="DuckDuckGo secure search">
          <label for="search-input" class="sr-only">Search query</label>
          <input id="search-input" type="search" name="q"
                 placeholder="DuckDuckGo…" autocomplete="off" required>
          <button type="submit" aria-label="Search with DuckDuckGo">Go ↗</button>
        </form>
      </section>
 
      <!-- News wire -->
      <section class="card card--wire" aria-labelledby="wire-heading">
        <h2 class="card__heading" id="wire-heading">Global News Wire</h2>
        <div id="wire-out" aria-live="polite" aria-busy="true">
          <p class="status">Loading…</p>
        </div>
      </section>
 
      <!-- MLB -->
      <section class="card card--mlb" aria-labelledby="mlb-heading">
        <h2 class="card__heading" id="mlb-heading">MLB</h2>
        <div id="mlb-out" aria-live="polite" aria-busy="true">
          <p class="status">Loading…</p>
        </div>
      </section>
 
      <!-- InformationWeek -->
      <section class="card card--info" aria-labelledby="info-heading">
        <h2 class="card__heading" id="info-heading">InformationWeek</h2>
        <div id="info-out" aria-live="polite" aria-busy="true">
          <p class="status">Loading…</p>
        </div>
      </section>
 
    </div>
  </main>
 
  <!-- NBA ticker (bottom) -->
  <nav class="ticker ticker--bottom" aria-label="NBA news ticker" aria-live="off">
    <span class="ticker__label" aria-hidden="true">NBA</span>
    <div class="ticker__track" id="nba-track" aria-hidden="true"></div>
  </nav>
 
  <script>
    /* ── Load data.json (generated by fetch_news.py via GitHub Action) ── */
    async function loadData() {
      try {
        const res = await fetch('data.json');
        if (!res.ok) throw new Error('data.json not found');
        return await res.json();
      } catch (e) {
        console.error('Could not load data.json:', e);
        return null;
      }
    }
 
    function renderItems(containerId, items, showSource) {
      const el = document.getElementById(containerId);
      el.setAttribute('aria-busy', 'false');
      if (!items || !items.length) {
        el.innerHTML = '<p class="status">No items found</p>';
        return;
      }
      el.innerHTML = items.map(item => {
        const tag = showSource && item.source
          ? `<span class="source-tag">[${item.source}]</span>` : '';
        return `<a class="news-item" href="${item.link}" target="_blank"
                   rel="noopener noreferrer" aria-label="${item.title}">
                  ${tag}${item.title}
                </a>`;
      }).join('');
    }
 
    function renderTicker(trackId, items, label) {
      const track = document.getElementById(trackId);
      if (!items || !items.length) return;
      const html = items.map(item =>
        `<a href="${item.link}" target="_blank" rel="noopener noreferrer">
          <span>[${label}]</span>${item.title}
        </a>`
      ).join('');
      track.innerHTML = html + html; // duplicate for seamless loop
    }
 
    async function loadWeather() {
      const el = document.getElementById('weather-out');
      try {
        const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
        const w   = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${geo.latitude}&longitude=${geo.longitude}&current_weather=true&temperature_unit=fahrenheit`
        ).then(r => r.json());
        el.innerHTML = `
          <div class="weather__temp" aria-label="${Math.round(w.current_weather.temperature)} degrees Fahrenheit">
            ${Math.round(w.current_weather.temperature)}°F
          </div>
          <p class="weather__city">${geo.city}, ${geo.region_code}</p>
          <p class="weather__isp">${geo.org}</p>
        `;
      } catch {
        el.innerHTML = '<div class="weather__temp">--°</div><p class="weather__city">Unavailable</p>';
      }
    }
 
    async function init() {
      loadWeather();
 
      const d = await loadData();
      if (!d) {
        ['wire-out','mlb-out','info-out'].forEach(id => {
          document.getElementById(id).innerHTML =
            '<p class="status">data.json missing — run fetch_news.py</p>';
        });
        return;
      }
 
      /* Wire — combine multiple news sources if present */
      const wireItems = [
        ...(d.wire  || []).map(i => ({...i, source: 'Reuters'})),
        ...(d.ap    || []).map(i => ({...i, source: 'AP'})),
        ...(d.bbc   || []).map(i => ({...i, source: 'BBC'})),
        ...(d.npr   || []).map(i => ({...i, source: 'NPR'})),
        ...(d.guardian   || []).map(i => ({...i, source: 'Guardian'})),
        ...(d.foxnews    || []).map(i => ({...i, source: 'Fox News'})),
        ...(d.aljazeera  || []).map(i => ({...i, source: 'Al Jazeera'})),
      ];
      renderItems('wire-out', wireItems, true);
 
      renderItems('mlb-out',  d.mlb  || [], false);
      renderItems('info-out', d.info || [], false);
 
      renderTicker('nfl-track',      d.nfl || [], 'NFL');
      renderTicker('nba-track',      d.nba || [], 'NBA');
      renderTicker('mlb-side-track', d.mlb || [], 'MLB');
    }
 
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
