<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento Desk</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 2rem;
        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: auto;
        }
        .bento-box {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .bento-box:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .hero { grid-column: 1 / -1; min-height: 200px; }
    </style>
</head>
<body>
    <div class="bento-grid">
        <div class="bento-box hero" id="latest-news">
            <h2>The Wire (Latest)</h2>
            <p>Loading automation...</p>
        </div>
<div class="bento-box" id="quick-tools">
    <h2>Quick Tools</h2>
    <div id="weather-display">Locating...</div>
    <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">
    <p>Search | Dictionary | Stocks</p>
</div>
        </div>
        <div class="bento-box" id="tech-news">
            <h2>The Stack</h2>
            <p>Loading IT news...</p>
        </div>
    </div>
    <script>
    fetch('data.json')
        .then(res => res.json())
        .then(data => {
            document.getElementById('latest-news').innerHTML = '<h2>The Wire (Latest)</h2>' + 
                data.wire.map(item => `<p><a href="${item.link}" target="_blank" style="color: #66b3ff; text-decoration: none;">▶ ${item.title}</a></p>`).join('');

            document.getElementById('tech-news').innerHTML = '<h2>The Stack</h2>' + 
                data.stack.map(item => `<p><a href="${item.link}" target="_blank" style="color: #66b3ff; text-decoration: none;">▶ ${item.title}</a></p>`).join('');
        })
        .catch(err => console.log('Waiting for first GitHub Action run...'));
        async function getWeather() {
    try {
        // Step 1: Get location via IP (ISP estimate)
        const geoRes = await fetch('https://ipapi.co/json/');
        const geoData = await geoRes.json();
        const { city, latitude, longitude } = geoData;

        // Step 2: Get weather via Open-Meteo (No key required)
        const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&temperature_unit=fahrenheit`);
        const weatherData = await weatherRes.json();
        const temp = Math.round(weatherData.current_weather.temperature);

        // Step 3: Inject into Bento box
        document.getElementById('weather-display').innerHTML = `
            <div style="font-size: 1.5rem; font-weight: bold;">${temp}°F</div>
            <div style="color: #aaa;">${city}</div>
        `;
    } catch (err) {
        document.getElementById('weather-display').innerText = "Weather unavailable";
    }
}

// Call it on load
getWeather();
</script>
</body>
</html>
