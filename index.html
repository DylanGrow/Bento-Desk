<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bento-Desk | Command Center</title>
  <style>
    :root {
      --bg: #050505;
      --text: #e8e9ea;
      --dim: #4a4d52;
      --font: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
      
      var(--c0): #FFB612; 
      --c1: #00e5ff; --c2: #39ff14; --c3: #ffea00; 
      --c4: #ff0055; --c5: #b026ff; --c6: #ff8800; 
      --c7: #00ff88; --c8: #ff00aa; --c9: #8800ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    #ddg-search {
      display: flex;
      align-items: center;
      background: #141414;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }
    #ddg-search input {
      background: transparent;
      border: none;
      color: #fff;
      padding: 10px 15px;
      font-family: var(--font);
      outline: none;
      width: 250px;
      font-size: 14px;
    }
    #ddg-search input:focus { background: #1a1a1a; }
    #ddg-search button {
      background: #222;
      border: none;
      border-left: 1px solid #333;
      padding: 10px 15px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }
    #ddg-search button:hover { background: #444; }

    #weather-widget {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      font-size: 14px;
    }
    .w-temp { font-size: 22px; font-weight: bold; color: var(--c1); }
    .w-loc { color: #888; font-size: 12px; margin-top: 2px; }

    #wall {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .row {
      flex: 1;
      display: flex;
      align-items: center;
      position: relative;
      border-bottom: 1px solid #1a1a1a;
      overflow: hidden;
    }
    .row:last-child { border-bottom: none; }

    .label {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 150px;
      z-index: 10;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: clamp(12px, 1.8vh, 20px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-right: 1px solid #1a1a1a;
      box-shadow: 15px 0 20px rgba(0,0,0,0.9);
    }

    .row.live-row .label { color: var(--bg); background: #FFB612; border-right-color: #FFB612; text-shadow: none; }
    .row:nth-child(2) .label { color: var(--c1); border-right-color: rgba(0,229,255,0.3); }
    .row:nth-child(3) .label { color: var(--c2); border-right-color: rgba(57,255,20,0.3); }
    .row:nth-child(4) .label { color: var(--c3); border-right-color: rgba(255,234,0,0.3); }
    .row:nth-child(5) .label { color: var(--c4); border-right-color: rgba(255,0,85,0.3); }
    .row:nth-child(6) .label { color: var(--c5); border-right-color: rgba(176,38,255,0.3); }
    .row:nth-child(7) .label { color: var(--c6); border-right-color: rgba(255,136,0,0.3); }
    .row:nth-child(8) .label { color: var(--c7); border-right-color: rgba(0,255,136,0.3); }
    .row:nth-child(9) .label { color: var(--c8); border-right-color: rgba(255,0,170,0.3); }

    .row.live-row .item:hover .source-tag { color: #FFB612; }
    .row:nth-child(2) .item:hover .source-tag { color: var(--c1); }
    .row:nth-child(3) .item:hover .source-tag { color: var(--c2); }
    .row:nth-child(4) .item:hover .source-tag { color: var(--c3); }
    .row:nth-child(5) .item:hover .source-tag { color: var(--c4); }
    .row:nth-child(6) .item:hover .source-tag { color: var(--c5); }
    .row:nth-child(7) .item:hover .source-tag { color: var(--c6); }
    .row:nth-child(8) .item:hover .source-tag { color: var(--c7); }
    .row:nth-child(9) .item:hover .source-tag { color: var(--c8); }

    .track-wrapper {
      display: flex;
      width: 100%;
      height: 100%;
      align-items: center;
      padding-left: 150px;
    }

    .track {
      display: inline-flex;
      white-space: nowrap;
      animation: tick 300s linear infinite;
      padding-left: 50px;
    }

    .row:nth-child(even) .track { animation-name: tick-reverse; }
    .track:hover { animation-play-state: paused; }

    @keyframes tick { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    @keyframes tick-reverse { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

    .item {
      color: #9ca3af;
      text-decoration: none;
      font-size: clamp(12px, 1.8vh, 18px);
      padding: 0 3vw;
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }
    .item:hover { color: #fff; text-decoration: underline; }

    .source-tag {
      color: var(--dim);
      font-size: 0.8em;
      margin-right: 12px;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    .status { padding: 20px 170px; color: var(--dim); font-style: italic; }
  </style>
</head>
<body>

  <header id="top-bar">
    <form id="ddg-search" action="https://duckduckgo.com/" method="GET" target="_blank">
      <input type="text" name="q" placeholder="Search DuckDuckGo..." required>
      <button type="submit" aria-label="Search">🦆</button>
    </form>
    <div id="weather-widget">
      <div class="w-temp" id="w-temp">--°F</div>
      <div class="w-loc" id="w-loc">Detecting local weather...</div>
    </div>
  </header>

  <div id="wall">
    <div class="status">Initializing Ticker Wall...</div>
  </div>

  <script>
    const groups = [
      { id: 'nfl', label: 'NFL', sources: ['nfl'] },
      { id: 'tech', label: 'TECH', sources: ['tech', 'hacker'] },
      { id: 'cyber', label: 'CYBER SEC', sources: ['cyber'] },
      { id: 'nba', label: 'NBA', sources: ['nba'] },
      { id: 'mlb', label: 'MLB', sources: ['mlb'] },
      { id: 'gaming', label: 'GAMING', sources: ['gaming'] },
      { id: 'space', label: 'SPACE', sources: ['space'] },
      { id: 'science', label: 'SCIENCE', sources: ['science'] }
    ];

    async function loadWeather() {
      try {
        const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
        const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geo.latitude}&longitude=${geo.longitude}&current_weather=true&temperature_unit=fahrenheit`).then(r => r.json());
        document.getElementById('w-temp').innerText = Math.round(w.current_weather.temperature) + '°F';
        document.getElementById('w-loc').innerText = `${geo.city}, ${geo.region_code}`;
      } catch (e) {
        document.getElementById('w-loc').innerText = 'Weather unavailable';
      }
    }

    async function loadLiveScores() {
      try {
        const [nbaRes, mlbRes] = await Promise.all([
          fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard'),
          fetch('https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard')
        ]);
        const nba = await nbaRes.json();
        const mlb = await mlbRes.json();

        let scoresHTML = '';

        const parseGames = (data, tag) => {
          data.events.forEach(event => {
            const status = event.status.type.shortDetail;
            const comp = event.competitions[0];
            const home = comp.competitors[0];
            const away = comp.competitors[1];
            scoresHTML += `<span class="item"><span class="source-tag">[${tag}]</span>${away.team.abbreviation} ${away.score} @ ${home.team.abbreviation} ${home.score} (${status})</span>`;
          });
        };

        parseGames(nba, 'NBA');
        parseGames(mlb, 'MLB');

        if (!scoresHTML) scoresHTML = `<span class="item"><span class="source-tag">[SYS]</span>No live games right now</span>`;
        return scoresHTML + scoresHTML; 

      } catch (e) {
        return `<span class="item"><span class="source-tag">[SYS]</span>Live scores unavailable</span>`;
      }
    }

    async function loadData() {
      try {
        const res = await fetch('data.json');
        if (!res.ok) throw new Error('Network ok');
        return await res.json();
      } catch (e) {
        return null;
      }
    }

    function buildItemHTML(item, sourceName) {
      return `<a href="${item.link}" class="item" target="_blank" rel="noopener noreferrer"><span class="source-tag">[${sourceName.toUpperCase()}]</span>${item.title}</a>`;
    }

    async function init() {
      loadWeather();
      
      const wall = document.getElementById('wall');
      wall.innerHTML = '<div class="status">Fetching data and live scores...</div>';

      const liveScoresHTML = await loadLiveScores();
      const data = await loadData();
      
      wall.innerHTML = '';

      wall.insertAdjacentHTML('beforeend', `
        <div class="row live-row">
          <div class="label">LIVE SCORES</div>
          <div class="track-wrapper">
            <div class="track">${liveScoresHTML}</div>
          </div>
        </div>
      `);

      groups.forEach(group => {
        let itemsHTML = '';
        if (data) {
          group.sources.forEach(src => {
            if (data[src] && data[src].length > 0) {
              data[src].forEach(item => { itemsHTML += buildItemHTML(item, src); });
            }
          });
        }

        if (!itemsHTML) itemsHTML = `<span class="item" style="pointer-events:none;"><span class="source-tag">[SYS]</span>Awaiting refresh from GitHub Actions...</span>`;

        const seamlessHTML = itemsHTML + itemsHTML;
        wall.insertAdjacentHTML('beforeend', `
          <div class="row">
            <div class="label">${group.label}</div>
            <div class="track-wrapper">
              <div class="track">${seamlessHTML}</div>
            </div>
          </div>
        `);
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
