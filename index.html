<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SysLog | Terminal</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23050505' width='100' height='100'/><text x='50' y='65' font-size='70' font-weight='900' text-anchor='middle' fill='%2300e5ff' font-family='monospace'>></text></svg>">
  <style>
    :root {
      --bg: #050505;
      --text: #e8e9ea;
      --dim: #4a4d52;
      --font: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
      
      --c0: #FFB612; 
      --c1: #00e5ff; --c2: #39ff14; --c3: #ffea00; 
      --c4: #ff0055; --c5: #b026ff; --c6: #ff8800; 
      --c7: #00ff88; --c8: #ff00aa; --c9: #8800ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    .brand {
      color: var(--c1);
      font-weight: 900;
      letter-spacing: 0.15em;
      font-size: 22px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
    }
    .brand::after {
      content: '_';
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #ddg-search {
      display: flex;
      align-items: center;
      background: #141414;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }
    #ddg-search input {
      background: transparent;
      border: none;
      color: #fff;
      padding: 10px 15px;
      font-family: var(--font);
      outline: none;
      width: 250px;
      font-size: 14px;
    }
    #ddg-search input::placeholder {
      color: #666;
    }
    #ddg-search input:focus { background: #1a1a1a; }
    #ddg-search button {
      background: #222;
      border: none;
      border-left: 1px solid #333;
      padding: 10px 15px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }
    #ddg-search button:hover { background: #444; }

    .weather-button {
      background: none;
      border: none;
      font-size: 32px;
      cursor: pointer;
      padding: 5px;
      transition: transform 0.2s, filter 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .weather-button:hover {
      transform: scale(1.1);
      filter: brightness(1.3);
    }
    .weather-button:active {
      transform: scale(0.95);
    }

    .weather-popup {
      position: fixed;
      bottom: 80px;
      right: 30px;
      background: #0a0a0a;
      border: 2px solid var(--c3);
      border-radius: 8px;
      padding: 20px 25px;
      font-size: 14px;
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(255, 234, 0, 0.2);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      min-width: 200px;
    }

    .weather-popup.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .weather-popup-title {
      color: var(--c3);
      font-weight: bold;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 12px;
    }

    .weather-popup-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .weather-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .weather-label {
      color: var(--dim);
      font-size: 12px;
    }

    .weather-value {
      color: #fff;
      font-weight: bold;
    }

    .weather-temp {
      font-size: 24px;
      color: var(--c3);
      font-weight: 900;
    }

    .weather-location {
      color: #888;
      font-size: 11px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #222;
    }

    #wall {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .row {
      flex: 1;
      display: flex;
      align-items: center;
      position: relative;
      border-bottom: 1px solid #1a1a1a;
      overflow: hidden;
    }
    .row:last-child { border-bottom: none; }

    .label {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 150px;
      z-index: 10;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: clamp(12px, 1.8vh, 20px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-right: 1px solid #1a1a1a;
      box-shadow: 15px 0 20px rgba(0,0,0,0.9);
      white-space: nowrap;
    }

    .row.live-row .label { color: var(--bg); background: #FFB612; border-right-color: #FFB612; text-shadow: none; }
    .row:nth-child(2) .label { color: var(--c1); border-right-color: rgba(0,229,255,0.3); }
    .row:nth-child(3) .label { color: var(--c2); border-right-color: rgba(57,255,20,0.3); }
    .row:nth-child(4) .label { color: var(--c3); border-right-color: rgba(255,234,0,0.3); }
    .row:nth-child(5) .label { color: var(--c4); border-right-color: rgba(255,0,85,0.3); }
    .row:nth-child(6) .label { color: var(--c5); border-right-color: rgba(176,38,255,0.3); }
    .row:nth-child(7) .label { color: var(--c6); border-right-color: rgba(255,136,0,0.3); }
    .row:nth-child(8) .label { color: var(--c7); border-right-color: rgba(0,255,136,0.3); }
    .row:nth-child(9) .label { color: var(--c8); border-right-color: rgba(255,0,170,0.3); }

    .row.live-row .item:hover .source-tag { color: #FFB612; }
    .row:nth-child(2) .item:hover .source-tag { color: var(--c1); }
    .row:nth-child(3) .item:hover .source-tag { color: var(--c2); }
    .row:nth-child(4) .item:hover .source-tag { color: var(--c3); }
    .row:nth-child(5) .item:hover .source-tag { color: var(--c4); }
    .row:nth-child(6) .item:hover .source-tag { color: var(--c5); }
    .row:nth-child(7) .item:hover .source-tag { color: var(--c6); }
    .row:nth-child(8) .item:hover .source-tag { color: var(--c7); }
    .row:nth-child(9) .item:hover .source-tag { color: var(--c8); }

    .track-wrapper {
      display: flex;
      width: 100%;
      height: 100%;
      align-items: center;
      padding-left: 150px;
    }

    .track {
      display: inline-flex;
      white-space: nowrap;
      animation: tick 500s linear infinite;
      padding-left: 50px;
    }

    .row:nth-child(even) .track { animation-name: tick-reverse; }
    .track:hover { animation-play-state: paused; }

    @keyframes tick { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    @keyframes tick-reverse { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

    .item {
      color: #9ca3af;
      text-decoration: none;
      font-size: clamp(12px, 1.8vh, 18px);
      padding: 0 3vw;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .item:hover { color: #fff; text-decoration: underline; }

    .source-tag {
      color: var(--dim);
      font-size: 0.8em;
      margin-right: 12px;
      font-weight: bold;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .status { 
      padding: 20px 170px; 
      color: var(--dim); 
      font-style: italic;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 768px) {
      #ddg-search { width: 100%; margin: 0 20px; }
      #ddg-search input { width: 100%; }
      .weather-button { font-size: 28px; }
    }
  </style>
</head>
<body>

  <header id="top-bar">
    <div class="brand">SysLog</div>
    <form id="ddg-search" action="https://duckduckgo.com/" method="GET" target="_blank">
      <input type="text" name="q" placeholder="Search DuckDuckGo..." required>
      <button type="submit" aria-label="Search">🦆</button>
    </form>
    <button class="weather-button" id="weather-btn" aria-label="Toggle weather">☀️</button>
  </header>

  <div class="weather-popup" id="weather-popup">
    <div class="weather-popup-title">Current Weather</div>
    <div class="weather-popup-content">
      <div class="weather-row">
        <div class="weather-label">Temperature</div>
        <div class="weather-temp" id="w-temp">--°F</div>
      </div>
      <div class="weather-row">
        <div class="weather-label">Condition</div>
        <div class="weather-value" id="w-condition">Loading...</div>
      </div>
      <div class="weather-row">
        <div class="weather-label">Humidity</div>
        <div class="weather-value" id="w-humidity">--</div>
      </div>
      <div class="weather-row">
        <div class="weather-label">Wind Speed</div>
        <div class="weather-value" id="w-wind">--</div>
      </div>
      <div class="weather-location" id="w-loc">Detecting location...</div>
    </div>
  </div>

  <div id="wall">
    <div class="status">Initializing SysLog...</div>
  </div>

    // Weather popup toggle

      weatherPopup.classList.toggle('active');

      if (!e.target.closest('.weather-button') && !e.target.closest('.weather-popup')) {
        weatherPopup.classList.remove('active');
      }
    });

          65: 'Heavy Rain',
          71: 'Light Snow',
          73: 'Snow',
          75: 'Heavy Snow',
          77: 'Snow Grains',
          80: 'Light Showers',
          81: 'Showers',
          82: 'Heavy Showers',
          85: 'Light Snow Showers',
          86: 'Snow Showers',
          95: 'Thunderstorm',
          96: 'Thunderstorm with Hail',

        document.getElementById('w-loc').innerText = `📍 ${geo.city}, ${geo.region_code}`;
