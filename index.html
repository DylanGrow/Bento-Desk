<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SysLog | Terminal</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23050505' width='100' height='100'/><text x='50' y='65' font-size='70' font-weight='900' text-anchor='middle' fill='%2300e5ff' font-family='monospace'>></text></svg>">
  <style>
    :root {
      --bg: #050505;
      --text: #e8e9ea;
      --dim: #4a4d52;
      --font: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
      --c1: #00e5ff; --c2: #39ff14; --c3: #ffea00; 
      --c4: #ff0055; --c5: #b026ff; --c6: #ff8800; 
      --c7: #00ff88; --c8: #ff00aa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    .brand {
      color: var(--c1);
      font-weight: 900;
      letter-spacing: 0.15em;
      font-size: 22px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
    }
    .brand::after { content: '_'; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    #ddg-search {
      display: flex;
      align-items: center;
      background: #141414;
      border: 1px solid #333;
      border-radius: 4px;
    }
    #ddg-search input {
      background: transparent; border: none; color: #fff;
      padding: 10px 15px; font-family: var(--font); width: 250px; outline: none;
    }
    #ddg-search button {
      background: #222; border: none; border-left: 1px solid #333;
      padding: 10px 15px; cursor: pointer;
    }

    .weather-button {
      background: none; border: none; font-size: 32px; cursor: pointer;
    }

    .weather-popup {
      position: fixed; bottom: 80px; right: 30px;
      background: #0a0a0a; border: 2px solid var(--c3);
      border-radius: 8px; padding: 20px; z-index: 1000;
      opacity: 0; transform: translateY(10px);
      pointer-events: none; transition: all 0.3s;
    }
    .weather-popup.active { opacity: 1; transform: translateY(0); pointer-events: auto; }

    #wall { flex: 1; display: flex; flex-direction: column; }

    .row {
      flex: 1; display: flex; align-items: center;
      position: relative; border-bottom: 1px solid #1a1a1a;
      overflow: hidden;
    }

    .label {
      position: absolute; left: 0; width: 150px; height: 100%;
      z-index: 10; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; text-transform: uppercase;
      border-right: 1px solid #1a1a1a;
    }

    /* Row Colors */
    .row:nth-child(1) .label { color: var(--c1); }
    .row:nth-child(2) .label { color: var(--c2); }
    .row:nth-child(3) .label { color: var(--c3); }
    .row:nth-child(4) .label { color: var(--c4); }
    .row:nth-child(5) .label { color: var(--c5); }
    .row:nth-child(6) .label { color: var(--c6); }
    .row:nth-child(7) .label { color: var(--c7); }
    .row:nth-child(8) .label { color: var(--c8); }

    .track-wrapper { padding-left: 150px; width: 100%; height: 100%; display: flex; align-items: center; }
    
    .track {
      display: inline-flex; white-space: nowrap;
      animation: tick 120s linear infinite;
    }
    .row:nth-child(even) .track { animation-name: tick-reverse; }
    .track:hover { animation-play-state: paused; }

    @keyframes tick { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    @keyframes tick-reverse { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

    .item {
      color: #9ca3af; text-decoration: none; padding: 0 40px;
      display: flex; align-items: center; font-size: 16px;
    }
    .item:hover { color: #fff; }
    .source-tag { color: var(--dim); font-size: 0.8em; margin-right: 10px; font-weight: bold; }

    .status { padding: 20px; color: var(--dim); text-align: center; }
  </style>
</head>
<body>

  <header id="top-bar">
    <div class="brand">SysLog</div>
    <form id="ddg-search" action="https://duckduckgo.com/" method="GET" target="_blank">
      <input type="text" name="q" placeholder="Search DuckDuckGo..." required>
      <button type="submit">🦆</button>
    </form>
    <button class="weather-button" id="weather-btn">☀️</button>
  </header>

  <div class="weather-popup" id="weather-popup">
    <div style="color:var(--c3); font-size:12px; margin-bottom:10px;">WEATHER_STATION</div>
    <div id="w-temp" style="font-size:24px; font-weight:900;">--°F</div>
    <div id="w-condition" style="color:#fff;">Loading...</div>
    <div id="w-loc" style="font-size:11px; color:#666; margin-top:10px;">Detecting...</div>
  </div>

  <div id="wall">
    <div class="status">Connecting to data stream...</div>
  </div>

  <script>
    // Configuration: Match these IDs to your Python feed keys
    const groups = [
      { id: 'nfl', label: 'NFL', sources: ['nfl'] },
      { id: 'tech', label: 'TECH', sources: ['tech', 'hacker'] },
      { id: 'cyber', label: 'CYBER', sources: ['cyber'] },
      { id: 'nba', label: 'NBA', sources: ['nba'] },
      { id: 'mlb', label: 'MLB', sources: ['mlb'] },
      { id: 'gaming', label: 'GAMING', sources: ['gaming'] },
      { id: 'space', label: 'SPACE', sources: ['space'] },
      { id: 'science', label: 'SCIENCE', sources: ['science'] }
    ];

    // Toggle Weather Popup
    const weatherBtn = document.getElementById('weather-btn');
    const weatherPopup = document.getElementById('weather-popup');
    weatherBtn.onclick = () => weatherPopup.classList.toggle('active');

    // Weather Logic
    async function loadWeather() {
      try {
        const geo = await fetch('https://ipapi.co/json/').then(r => r.json());
        const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geo.latitude}&longitude=${geo.longitude}&current_weather=true&temperature_unit=fahrenheit`).then(r => r.json());
        
        document.getElementById('w-temp').innerText = Math.round(w.current_weather.temperature) + '°F';
        document.getElementById('w-condition').innerText = 'Condition Code: ' + w.current_weather.weathercode;
        document.getElementById('w-loc').innerText = `📍 ${geo.city}, ${geo.region_code}`;
      } catch (e) { console.error("Weather failed"); }
    }

    // News Logic (Reads the data.json from your repo)
    async function loadFeeds() {
      try {
        const response = await fetch('./data.json');
        if (!response.ok) throw new Error('data.json not found');
        const data = await response.json();
        
        const wall = document.getElementById('wall');
        wall.innerHTML = ''; 

        groups.forEach(group => {
          let items = [];
          group.sources.forEach(s => { if(data[s]) items = [...items, ...data[s].map(i => ({...i, s}))]; });

          if (items.length === 0) return;

          const row = document.createElement('div');
          row.className = 'row';
          
          // Double the items for a seamless infinite loop
          const scrollContent = [...items, ...items].map(item => `
            <a href="${item.link}" target="_blank" class="item">
              <span class="source-tag">[${item.s.toUpperCase()}]</span> ${item.title}
            </a>
          `).join('');

          row.innerHTML = `
            <div class="label">${group.label}</div>
            <div class="track-wrapper"><div class="track">${scrollContent}</div></div>
          `;
          wall.appendChild(row);
        });
      } catch (e) {
        document.querySelector('.status').innerText = "Data Stream Offline. Run GitHub Action.";
      }
    }

    // Init
    loadWeather();
    loadFeeds();
  </script>
</body>
</html>
