<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Center — Ticker Wall</title>
  <style>
    :root {
      --bg: #050505;
      --text: #e8e9ea;
      --dim: #4a4d52;
      --font: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
      
      /* Neon Accents */
      --c1: #00e5ff; /* Breaking */
      --c2: #39ff14; /* Sports */
      --c3: #ffea00; /* World */
      --c4: #ff0055; /* USA */
      --c5: #b026ff; /* Tech */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Row Layout */
    .row {
      flex: 1;
      display: flex;
      align-items: center;
      position: relative;
      border-bottom: 1px solid #1a1a1a;
      overflow: hidden;
    }
    .row:last-child { border-bottom: none; }

    /* Static Left Label */
    .label {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 10;
      background: var(--bg);
      padding: 0 2vw;
      display: flex;
      align-items: center;
      font-weight: 800;
      font-size: 2.5vh;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-right: 1px solid #1a1a1a;
      box-shadow: 15px 0 20px rgba(0,0,0,0.9);
    }

    /* Label Colors */
    .row:nth-child(1) .label { color: var(--c1); border-right-color: rgba(0,229,255,0.3); }
    .row:nth-child(2) .label { color: var(--c2); border-right-color: rgba(57,255,20,0.3); }
    .row:nth-child(3) .label { color: var(--c3); border-right-color: rgba(255,234,0,0.3); }
    .row:nth-child(4) .label { color: var(--c4); border-right-color: rgba(255,0,85,0.3); }
    .row:nth-child(5) .label { color: var(--c5); border-right-color: rgba(176,38,255,0.3); }

    /* Scrolling Track */
    .track-wrapper {
      display: flex;
      width: 100%;
      height: 100%;
      align-items: center;
      padding-left: 150px; /* Space for the static label */
    }

    .track {
      display: inline-flex;
      white-space: nowrap;
      animation: tick 120s linear infinite;
      padding-left: 50px;
    }

    /* Alternate Directions */
    .row:nth-child(even) .track {
      animation-name: tick-reverse;
    }

    .track:hover {
      animation-play-state: paused;
    }

    @keyframes tick {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    
    @keyframes tick-reverse {
      0% { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }

    /* Individual News Items */
    .item {
      color: #9ca3af;
      text-decoration: none;
      font-size: 2.2vh;
      padding: 0 3vw;
      transition: color 0.2s, transform 0.2s;
      display: flex;
      align-items: center;
    }
    
    .item:hover {
      color: #fff;
      text-decoration: underline;
    }

    .source-tag {
      color: var(--dim);
      font-size: 1.5vh;
      margin-right: 12px;
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    
    .row:nth-child(1) .item:hover .source-tag { color: var(--c1); }
    .row:nth-child(2) .item:hover .source-tag { color: var(--c2); }
    .row:nth-child(3) .item:hover .source-tag { color: var(--c3); }
    .row:nth-child(4) .item:hover .source-tag { color: var(--c4); }
    .row:nth-child(5) .item:hover .source-tag { color: var(--c5); }

    .status {
      padding-left: 200px;
      color: var(--dim);
      font-style: italic;
    }
  </style>
</head>
<body>

  <div id="wall">
    <div class="status" style="margin-top: 50px;">Initializing Ticker Wall...</div>
  </div>

  <script>
    const groups = [
      { id: 'breaking', label: 'WIRE', sources: ['wire', 'ap'] },
      { id: 'sports', label: 'SPORTS', sources: ['nfl', 'nba', 'mlb'] },
      { id: 'world', label: 'GLOBAL', sources: ['bbc', 'aljazeera'] },
      { id: 'usa', label: 'POLITICS', sources: ['npr', 'foxnews', 'guardian'] },
      { id: 'tech', label: 'TECH', sources: ['info'] }
    ];

    async function loadData() {
      try {
        const res = await fetch('data.json');
        if (!res.ok) throw new Error('Network response was not ok');
        return await res.json();
      } catch (e) {
        console.error('Failed to load data.json', e);
        document.getElementById('wall').innerHTML = '<div class="status" style="margin-top: 50px;">Error loading data.json. Ensure fetch_news.py has run.</div>';
        return null;
      }
    }

    function buildItemHTML(item, sourceName) {
      return `
        <a href="${item.link}" class="item" target="_blank" rel="noopener noreferrer">
          <span class="source-tag">[${sourceName.toUpperCase()}]</span>
          ${item.title}
        </a>
      `;
    }

    async function init() {
      const data = await loadData();
      if (!data) return;

      const wall = document.getElementById('wall');
      wall.innerHTML = '';

      groups.forEach(group => {
        let itemsHTML = '';
        
        // Aggregate all sources for this row
        group.sources.forEach(src => {
          if (data[src] && data[src].length > 0) {
            data[src].forEach(item => {
              itemsHTML += buildItemHTML(item, src);
            });
          }
        });

        if (!itemsHTML) {
          itemsHTML = `<span class="item" style="pointer-events:none;"><span class="source-tag">[SYS]</span>No data found for ${group.label}</span>`;
        }

        // Duplicate the string to create the seamless infinite scroll loop
        const seamlessHTML = itemsHTML + itemsHTML;

        const rowHTML = `
          <div class="row">
            <div class="label">${group.label}</div>
            <div class="track-wrapper">
              <div class="track">
                ${seamlessHTML}
              </div>
            </div>
          </div>
        `;
        
        wall.insertAdjacentHTML('beforeend', rowHTML);
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
